# Ollama: по умолчанию alpine/ollama — CPU-only, без CUDA (~25 MB на платформу). Тот же API :11434.
# Официальный ollama/ollama тащит libggml-cuda и др. на гигабайты — из-за этого часто «no space left on device».
# Для NVIDIA GPU: OLLAMA_IMAGE=ollama/ollama:latest docker compose up  (и nvidia-container-toolkit + --gpus)

services:
  ollama:
    image: ${OLLAMA_IMAGE:-alpine/ollama:latest}
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  ollama-pull:
    image: ${OLLAMA_IMAGE:-alpine/ollama:latest}
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["/bin/sh", "-c", "exec ollama pull \"$$OLLAMA_MODEL\""]

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

volumes:
  ollama_data:
