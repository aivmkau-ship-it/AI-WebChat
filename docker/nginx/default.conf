server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Прокси на сервис ollama в Docker Compose (браузер → тот же origin → без CORS).
    location /ollama/ {
        proxy_pass http://ollama:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Оболочка и точки входа Flutter — без долгого кэша, иначе после деплоя остаётся
    # старый main.dart.js (например запросы на 127.0.0.1:11434 вместо /ollama).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /flutter.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
